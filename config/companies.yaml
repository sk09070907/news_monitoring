# ============================================================
# モニタリング対象企業設定
# このファイルを編集して企業を追加・削除してください
# ============================================================
#
# 【フィールド説明】
#   name         : 表示名（Discord通知に使用）※必須
#   official     : 正式名称（例: 三井物産株式会社）
#   english      : 英語名（例: Mitsui & Co）
#   short        : 略称（name と異なる場合のみ）
#   ticker       : ティッカーシンボル（例: MITSY）
#   code         : 証券コード（例: 8031）
#   extra        : 上記以外に検索したい追加キーワード（リスト形式）
#
# ※ official / english / ticker / code はすべて検索キーワードとして使用されます
# ============================================================

companies:
  - name: "三井物産"
    official: "三井物産株式会社"
    english: "Mitsui & Co"
    ticker: "MITSY"
    code: "8031"

  - name: "三菱商事"
    official: "三菱商事株式会社"
    english: "Mitsubishi Corporation"
    ticker: "MSBHF"
    code: "8058"

  # 追加テンプレート:
  # - name: "企業表示名"
  #   official: "正式名称株式会社"
  #   english: "English Name"
  #   short: "略称"          # name と同じなら省略可
  #   ticker: "TICKER"       # 東証・NYSE等のティッカー（任意）
  #   code: "0000"           # 証券コード（任意）
  #   extra:                 # その他のキーワード（任意）
  #     - "別名・旧社名など"
