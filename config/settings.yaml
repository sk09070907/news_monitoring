# ============================================================
# ニュースモニタリング設定
# ※ 企業リストは config/companies.yaml を編集してください
# ============================================================

# -----------------------------------------------------------
# ニュースソース設定
# enabled: false にすると個別に無効化できます
# -----------------------------------------------------------
news_sources:
  # ── 経済・ビジネス総合（日本語） ──────────────────────────
  - name: "日本経済新聞"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "nikkei.com"

  - name: "東洋経済"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "toyokeizai.net"

  - name: "ダイヤモンド"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "diamond.jp"

  - name: "Bloomberg"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "bloomberg.co.jp"

  # ── 英語（グローバル） ────────────────────────────────────
  - name: "Reuters"
    type: google_news
    enabled: true
    language: en
    country: US
    site_filter: "reuters.com"

  - name: "Nikkei Asia"
    type: google_news
    enabled: true
    language: en
    country: US
    site_filter: "asia.nikkei.com"

  - name: "Financial Times"
    type: google_news
    enabled: true
    language: en
    country: US
    site_filter: "ft.com"

  # ── プレスリリース ────────────────────────────────────────
  - name: "PR TIMES"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "prtimes.jp"

  - name: "日経プレスリリース"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "release.nikkei.co.jp"

  - name: "時事通信"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "jiji.com"

  - name: "NHK"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "nhk.or.jp"

  - name: "日刊工業新聞"
    type: google_news
    enabled: true
    language: ja
    country: JP
    site_filter: "nikkan.co.jp"

